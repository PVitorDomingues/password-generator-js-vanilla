<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <main class="main-content">
        <div class="container">
        <h1>Calculadora de IMC</h1>
        
        <div class="controls">
            <label>Peso (kg):</label>
            <input type="number" id="peso" placeholder="Ex: 70.5">
            
            <label>Altura (m):</label>
            <input type="number" id="altura" placeholder="Ex: 1.75">
        </div>

        <button id="btnCalcular">Calcular IMC</button>

        <div id="resultadoImc" class="password-display" style="margin-top: 20px; display: none;">
            <span id="valorImc">--</span>
            <p id="classificacaoImc"></p>
        </div>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/imc.js"></script>
</body>
</html>
