<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Texto</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <main class="main-content">
        <div class="container">
        <h1>Conversor de Texto</h1>
        <p>Altere a caixa do seu texto de forma rápida.</p>

        <textarea id="inputText" placeholder="Cole seu texto aqui..." rows="8" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; font-family: inherit;"></textarea>

        <div class="controls" style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <button id="btnUpper">MAIÚSCULAS</button>
            <button id="btnLower">minúsculas</button>
            <button id="btnCopy">Copiar Texto</button>
            <button id="btnClear" style="background-color: #ff4d4d;">Limpar</button>
        </div>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/texto.js"></script>
</body>
</html>
