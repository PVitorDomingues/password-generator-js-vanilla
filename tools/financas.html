<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Finanças</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="container">
        <a href="../index.html" style="color: #4db8ff; text-decoration: none;">← Voltar</a>
        <h1>Controle de Finanças</h1>

        <div class="controls">
            <input type="text" id="desc" placeholder="Ex: Aluguel">
            <input type="number" id="valor" placeholder="Ex: 1200.00">
            <button id="btnAdicionar">Adicionar Gasto</button>
        </div>

        <div class="password-display" style="margin-top: 20px;">
            <h3>Total: R$ <span id="totalGasto">0.00</span></h3>
        </div>

        <table id="tabelaFinancas" style="width: 100%; margin-top: 20px; color: white; border-collapse: collapse;">
            <thead>
                <tr style="border-bottom: 1px solid #4db8ff;">
                    <th style="text-align: left; padding: 10px;">Descrição</th>
                    <th style="text-align: right; padding: 10px;">Valor</th>
                </tr>
            </thead>
            <tbody id="listaGastos">
                </tbody>
        </table>
    </div>
    <script src="../js/financas.js"></script>
</body>
</html>
